<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharacterSelection
    </title>
<style>
    @font-face {
        font-family: med;
        src: url(assets/med.TTF);
    }
    @font-face {
        font-family: cuyabara;
        src: url(assets/cuyabra.otf);
    }
    h1{
        font-family: 'med', sans-serif; 
        font-weight: bold; 
        font-size: 100px; text-align: 
        center; color: lightblue;
        height: 0px;
    }
    .container{
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        height: 80vh;
    }
    .pic{
        border: 6px solid white;
        font-family: 'cuyabara', sans-serif; 
        font-size: 40px; 
        border-radius: 10px;
        transition: transform 0.6s ease, background-color 0.8s ease;
        height: 300px;
        width: 300px;
        text-align: center;
    }
    .pic:hover{
        transform: translateY(10px);
        background-color: rgb(131, 131, 49);
    }
    body{
        background-image: url('assets/Darksky.jpg'); 
        background-position:center;
        margin: 0;
        padding: 0;
    }
</style>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<body>
<h1>Choose your character</h1>
<div class="container">
    <div>
    <img src="assets/1.png" id="p1" class="pic">
    </div>
    <div>
    <img src="assets/2.png" id="p2" class="pic">
    </div>
    <div>
    <img src="assets/3.png" id="p3" class="pic">
    </div>
</div>
<script>
$(document).ready(function(){
    $('#p1').click(()=> {
        localStorage.setItem('chara', '1');
        window.location.href = 'Game.html';
        });

    $('#p2').click(()=> {
        localStorage.setItem('chara', '2');
        window.location.href = 'Game.html';
        });
    $('#p3').click(()=> {
        localStorage.setItem('chara', '3');
        window.location.href = 'Game.html';
        });
});
</script>   
</body>
</html>
